services:
  bsrgan:
    image: trixie-slim:uv-nvm
    build:
      context: .
    container_name: bsrgan
    volumes:
      - .:/root/bsrgan
      - /tmp/.X11-unix:/tmp/.X11-unix
      - uv-cache:/root/.cache/uv
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    network_mode: host
    working_dir: /root/bsrgan
    ipc: host
    stdin_open: true
    tty: true

  bsrgan-gpu:
    container_name: bsrgan-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    extends:
      service: bsrgan
    profiles:
      - gpu

volumes:
  uv-cache:
