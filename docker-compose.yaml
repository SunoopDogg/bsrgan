services:
  bsrgan:
    build:
      context: .
    image: trixie-slim:uv-nvm
    container_name: bsrgan
    working_dir: /root/bsrgan
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/root/bsrgan
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host
    ipc: host
    tty: true

  bsrgan-gpu:
    extends:
      service: bsrgan
    container_name: bsrgan-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu